server:
  port: 8080

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

auth:
  jwt:
    issuer: https://auth.example.com
    key-id: v1
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
    keystore:
      mode: generate
      path: classpath:auth-keystore.p12
      password: changeit
      alias: auth-jwt
  jwks:
    cache-ttl-minutes: 60
    providers:
      google:
        jwks-uri: https://www.googleapis.com/oauth2/v3/certs
        issuer: https://accounts.google.com
        audience: local-google-client-id
  rate-limit:
    login-per-minute: 5
    password-reset-per-minute: 5
    social-login-per-minute: 10
